<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE PUSH | OFFICIAL</title>
    <style>
        :root { --bg: #0f0c29; --accent: #9b59b6; --text: #fff; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 100%; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: var(--glass); border: 1px solid var(--accent); color: white; border-radius: 10px; font-weight: bold; }
        .panel { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--accent); border-radius: 12px; color: white; box-sizing: border-box; }
        button.action { width: 100%; padding: 15px; background: linear-gradient(to right, var(--accent), #6c5ce7); border: none; color: white; font-weight: bold; border-radius: 12px; }
        .copy-box { background: #000; padding: 12px; border-radius: 10px; border: 1px dashed var(--accent); margin: 10px 0; font-size: 0.9rem; text-align: center; }
        .hidden { display: none; }
        h1 { margin-top: 0; font-size: 1.5rem; color: #81ecec; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-bar">
        <button class="tab-btn" onclick="show('gen')">ORDER BUILDER</button>
        <button class="tab-btn" onclick="show('spec')">PAYMENT</button>
    </div>

    <div id="genSection" class="panel">
        <h1>ELITE ORDER BUILDER</h1>
        <select id="mode" onchange="updateTerms()"><option value="BR">BR (Top 10)</option><option value="CS">CS (Win/Star)</option></select>
        <p id="termsText" style="font-size:0.8rem; opacity:0.7;"></p>
        <input type="number" id="count" placeholder="Number of matches (Max 50)">
        <button class="action" onclick="addToCart()">ADD TO CART</button>
        <div id="cartDisplay" style="margin-top:20px;">
            <h3>Order Summary</h3>
            <div id="cartItems"></div>
            <button id="checkoutBtn" class="hidden action" style="margin-top:20px; background: #27ae60;" onclick="checkout()">COMPLETE ORDER (CONTACT ADMIN)</button>
        </div>
    </div>

    <div id="specSection" class="panel hidden">
        <h1>PAYMENT PORTAL</h1>
        <input type="text" id="payCode" placeholder="Enter ESP/S-Code...">
        <button class="action" onclick="verifyPay()">VERIFY & PAY</button>
        <div id="payResult" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    let cart = [];
    function show(p) {
        document.getElementById('genSection').classList.toggle('hidden', p !== 'gen');
        document.getElementById('specSection').classList.toggle('hidden', p !== 'spec');
    }
    function updateTerms() {
        const m = document.getElementById('mode').value;
        document.getElementById('termsText').innerText = (m === 'BR') ? "BR: Verified only if Top 10 achieved." : "CS: Verified on Win or Star gain.";
    }
    function addToCart() {
        const c = document.getElementById('count').value;
        if(c > 50) return alert("Contact owner for orders over 50!");
        const m = document.getElementById('mode').value;
        cart.push(`${c.padStart(3,'0')} ${m}`);
        document.getElementById('cartItems').innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">Order Code: <strong>${c.padStart(3,'0')} ${m}</strong></div>`;
        document.getElementById('checkoutBtn').classList.remove('hidden');
    }
    function checkout() {
        alert("Redirecting to Admin to confirm your order...");
        window.location.href = "https://www.instagram.com/nikhillxd1233";
    }
    function verifyPay() {
        const code = document.getElementById('payCode').value.toUpperCase();
        const res = document.getElementById('payResult');
        if(code.startsWith("ESP")) {
            const num = parseInt(code.match(/\d+/)[0]);
            const total = (num <= 10) ? (num * 4) : (40 + (num - 10) * 5);
            res.innerHTML = `<h3>Total: ₹${total}</h3>
            <div class="copy-box" onclick="navigator.clipboard.writeText('9755797842@fam')">Copy UPI: 9755797842@fam</div>
            <a href="https://www.instagram.com/nikhillxd1233"><button class="action">CONTACT ADMIN TO FINISH</button></a>`;
        } else { res.innerHTML = "Invalid Code. Please try again."; }
    }
    updateTerms();
</script>
</body>
</html>
