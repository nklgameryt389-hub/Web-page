<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag is the most important part for Android compatibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE PUSH | ORDER</title>
    <style>
        :root { --bg: #0f0c29; --accent: #9b59b6; --text: #fff; --glass: rgba(255, 255, 255, 0.08); }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%; 
            max-width: 450px; /* Keeps it looking great on big phones */
        }

        .panel { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            padding: 25px; 
            border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        input, select { 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            background: #000; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            color: white; 
            font-size: 16px; /* 16px prevents auto-zoom on iOS/Android */
            box-sizing: border-box; 
        }

        button.action { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(to right, var(--accent), #6c5ce7); 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-size: 16px;
            border-radius: 15px; 
            margin-top: 10px;
            cursor: pointer;
        }

        h1 { font-size: 1.5rem; color: #81ecec; text-align: center; margin-bottom: 20px; }
        
        .order-summary { 
            background: #000; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid var(--accent); 
            margin-top: 25px; 
            text-align: center; 
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="genSection" class="panel">
        <h1>ORDER BUILDER</h1>
        <select id="mode">
            <option value="BR">BR (Top 10)</option>
            <option value="CS">CS (Win/Star)</option>
        </select>
        <input type="number" id="count" placeholder="Matches (Max 50)" pattern="\d*">
        <button class="action" onclick="generateOrder()">ADD TO CART</button>
        
        <div id="orderDisplay" class="order-summary hidden">
            <h3 id="orderText" style="margin-top:0;"></h3>
            <p style="font-size: 0.9rem; opacity: 0.8;">To complete your order, please contact the owner.</p>
            <a href="https://www.instagram.com/nikhillxd1233" style="text-decoration:none;">
                <button class="action" style="background: #27ae60;">CONTACT OWNER TO BUY</button>
            </a>
        </div>
    </div>
</div>

<script>
    function generateOrder() {
        const c = document.getElementById('count').value;
        const m = document.getElementById('mode').value;
        
        if(!c || c < 1 || c > 50) {
            alert("Please enter a number between 1 and 50.");
            return;
        }
        
        const display = document.getElementById('orderDisplay');
        const text = document.getElementById('orderText');
        
        text.innerText = `Order: ${c.padStart(3,'0')} ${m}`;
        display.classList.remove('hidden');
        
        // Auto-scroll to summary on mobile
        display.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
