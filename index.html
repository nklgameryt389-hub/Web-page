<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELITE RANK PUSH | PRO</title>
    <style>
        :root { --deep-blue: #0f0c29; --accent-purple: #9b59b6; --sky: #81ecec; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .panel { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        h1 { color: var(--sky); text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--accent-purple); border-radius: 10px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(to right, var(--accent-purple), #6c5ce7); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; }
        .copy-box { background: #000; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; border: 1px dashed var(--accent-purple); margin: 10px 0; font-size: 0.9rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="show('gen')">ORDER BUILDER</button>
        <button onclick="show('spec')">PAYMENT PORTAL</button>
    </div>

    <!-- ORDER BUILDER -->
    <div id="genSection" class="panel">
        <h1>ORDER BUILDER</h1>
        <select id="mode" onchange="updateTerms()"><option value="BR">BR (Top 10)</option><option value="CS">CS (Win/Star)</option></select>
        <p id="termsText" style="font-size:0.8rem; color:#bdc3c7;"></p>
        <input type="number" id="count" placeholder="Matches (Max 50)">
        <button onclick="addToCart()">ADD TO CART</button>
        <div id="cartItems"></div>
    </div>

    <!-- PAYMENT PORTAL -->
    <div id="specSection" class="panel hidden">
        <h1>PAYMENT PORTAL</h1>
        <input type="text" id="payCode" placeholder="Enter ESP... or S...">
        <button onclick="verifyPay()">VERIFY & PAY</button>
        <div id="payResult" class="result"></div>
    </div>
</div>

<script>
    let cart = [];
    function show(p) {
        document.getElementById('genSection').classList.toggle('hidden', p !== 'gen');
        document.getElementById('specSection').classList.toggle('hidden', p !== 'spec');
    }
    function updateTerms() {
        const m = document.getElementById('mode').value;
        document.getElementById('termsText').innerText = (m === 'BR') ? "BR: Matches verified only if Top 10 achieved." : "CS: Verified on Win or Star gain.";
    }
    function addToCart() {
        const c = parseInt(document.getElementById('count').value);
        if(!c || c < 1) return alert("Enter valid matches");
        if(c > 50) { alert("Max 50 matches. Contact owner for bulk."); return; }
        const m = document.getElementById('mode').value;
        cart.push(`${c.toString().padStart(3,'0')} ${m}`);
        document.getElementById('cartItems').innerHTML += `<div style="border-bottom:1px solid #444; padding:8px;">${cart[cart.length-1]}</div>`;
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert("Copied: " + text);
    }

    function verifyPay() {
        const code = document.getElementById('payCode').value.toUpperCase();
        const res = document.getElementById('payResult');
        
        if(code.startsWith("ESP")) {
            const num = parseInt(code.match(/\d+/)[0]);
            // Logic: 10 matches @ 4rs = 40rs. After that 5rs per match.
            let total = 0;
            if (num <= 10) {
                total = num * 4;
            } else {
                total = 40 + ((num - 10) * 5);
            }
            
            res.innerHTML = `<h3>Total: ₹${total}</h3>
            <p>Click details to copy:</p>
            <div class="copy-box" onclick="copyToClipboard('9755797842@fam')">UPI: 9755797842@fam</div>
            <a href="https://upi://pay?pa=9755797842@fam&pn=Owner"><button>DIRECT UPI PAY</button></a>
            <a href="https://www.instagram.com/nikhillxd1233" target="_blank"><button>INSTAGRAM DM</button></a>
            <div class="copy-box" onclick="copyToClipboard('https://www.instagram.com/nikhillxd1233')">Copy Instagram Link</div>`;
        } else if(code.startsWith("S")) {
            res.innerHTML = "<h3>Special Offer!</h3><p>Contact for custom invoice:</p><a href='https://www.instagram.com/nikhillxd1233'><button>DM OWNER</button></a>";
        } else { res.innerHTML = "Invalid Code!"; }
    }
    updateTerms();
</script>
</body>
</html>
